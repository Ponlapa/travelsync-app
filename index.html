<!DOCTYPE html>
<html lang="th" data-theme="pastel">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TravelSync Core V2</title>
  
  <link rel="manifest" href="manifest.json">
  
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    /* ==========================================================================
       1. โครงสร้างหลักของหน้าเว็บและกรอบนอก (Layout & Global Elements)
       ========================================================================== */
    html, body {
      background-color: #f8fafc; 
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; 
      font-family: 'Mitr', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app-container {
      width: 100%;
      max-width: 412px;  
      height: 100dvh; 
      background-color: #ffffff;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      overflow: hidden;  
      box-sizing: border-box;
    }

    .hidden {
      display: none !important;
    }

    /* ==========================================================================
       2. โครงสร้างหน้าจอหลักแต่ละหน้า (Views Layout)
       ========================================================================== */
    #view-login {
      height: 100% !important;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 24px;
      box-sizing: border-box;
    }

    #view-trips {
      background-color: #ffffff !important; 
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      box-sizing: border-box;
    }

    #view-dashboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      box-sizing: border-box;
    }

    /* ==========================================================================
       3. โครงสร้างระบบสกรอลล์เลื่อนหน้าจอภายใน (🔒 FIXED SCROLL SYSTEM)
       ========================================================================== */
    #trips-list-container {
      flex: 1;
      overflow-y: auto !important;
      padding: 16px;
      padding-bottom: 40px;
      -webkit-overflow-scrolling: touch;
    }

    #sub-view-itinerary {
      flex: 1 !important;
      display: flex;
      flex-direction: column;
      height: calc(100% - 65px) !important; 
      overflow: hidden !important; 
      padding: 16px;
      box-sizing: border-box;
    }

    #itinerary-timeline {
      flex: 1 !important;
      overflow-y: auto !important; 
      padding-right: 4px;
      padding-bottom: 40px;
      -webkit-overflow-scrolling: touch;
    }

    /* เมนูบาร์สำหรับสลับแท็บวันเดินทาง */
    #itinerary-day-tabs-bar {
      display: flex;
      gap: 8px;
      overflow-x: auto !important;
      padding-bottom: 8px;
      margin-bottom: 12px;
      width: 100%;
      scrollbar-width: none;
    }
    #itinerary-day-tabs-bar::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>

  <div class="app-container shadow-2xl">
    
    <div id="view-login" class="w-full bg-white hidden">
      <div class="text-center mt-4">
        <h1 class="text-4xl font-black text-slate-800 tracking-tight flex items-center justify-center gap-2">
          <i class="fa-solid fa-plane-departure text-primary text-3xl"></i>
          <span>TravelSync</span>
        </h1>
        <p class="text-xs font-bold text-slate-400 mt-2 uppercase tracking-widest">แอปพลิเคชันจัดการทริปและแผนกิจกรรมกลุ่ม</p>
      </div>

      <div class="w-full space-y-5 my-auto">
        <div class="form-control w-full">
          <label class="label"><span class="label-text font-black text-slate-600 text-xs">เลือกชื่อผู้ใช้งานของคุณ</span></label>
          <select id="login-user-select" class="select select-bordered w-full font-bold text-slate-800 bg-slate-50 border-2 rounded-xl focus:outline-none focus:border-primary">
            <option value="" disabled selected>⏳ กำลังโหลดรายชื่อผู้ใช้...</option>
          </select>
        </div>

        <div class="form-control w-full">
          <label class="label"><span class="label-text font-black text-slate-600 text-xs">ระบุรหัสส่วนตัวความปลอดภัย (PIN)</span></label>
          <input type="password" id="login-user-pin" placeholder="••••" maxlength="4" class="input input-bordered w-full text-center text-xl font-black tracking-widest text-slate-800 bg-slate-50 border-2 rounded-xl focus:outline-none focus:border-primary">
        </div>

        <button onclick="handleUserLoginSubmit()" class="btn btn-primary w-full text-sm font-black text-white rounded-2xl shadow-md h-12 min-h-0 bg-gradient-to-r from-primary to-indigo-600 border-0 hover:opacity-90 mt-2">
          เข้าสู่หน้าแอปพลิเคชัน 🚀
        </button>
      </div>

      <div class="text-center pt-4 border-t border-slate-100 w-full">
        <span class="text-[11px] font-bold text-slate-300">TravelSync Core Finance PWA V2</span>
      </div>
    </div>

    <div id="view-trips" class="w-full hidden">
      <div class="bg-white px-4 pt-5 pb-3 border-b border-slate-100 shrink-0 flex justify-between items-center">
        <div class="flex items-center gap-2.5">
          <div class="w-9 h-9 bg-primary/10 rounded-xl flex items-center justify-center text-primary text-lg"><i class="fa-solid fa-compass"></i></div>
          <div>
            <span id="current-user-badge" class="badge badge-outline text-[10px] font-black px-2 py-2">👤 Loading...</span>
            <h2 class="text-lg font-black text-slate-800 tracking-tight mt-0.5">ทริปของกลุ่มทัวร์</h2>
          </div>
        </div>
        <button onclick="backToLogin()" class="btn btn-xs btn-outline font-black rounded-lg px-2"><i class="fa-solid fa-arrow-right-from-bracket"></i> ออก</button>
      </div>
      
      <div id="trips-list-container" class="space-y-3">
        </div>
    </div>

    <div id="view-dashboard" class="w-full hidden relative">
      <div class="bg-white px-4 pt-4 pb-3 border-b border-slate-100 shrink-0 flex items-center gap-2">
        <button onclick="backToTrips()" class="btn btn-sm btn-circle bg-slate-100 text-slate-600 border-0 hover:bg-slate-200 shadow-3xs flex items-center justify-center w-8 h-8 min-h-0"><i class="fa-solid fa-arrow-left text-xs"></i></button>
        <div class="min-w-0 flex-1">
          <h2 id="dash-trip-title" class="text-base font-black text-slate-800 truncate">แดชบอร์ดข้อมูลทริป</h2>
          <span class="text-[10px] text-slate-400 font-bold block truncate mt-0.5">TravelSync Core Finance Center</span>
        </div>
      </div>

      <div class="flex-1 overflow-hidden relative">
        <div id="sub-view-itinerary" class="hidden">
          <div class="flex justify-between items-center mb-1 shrink-0">
            <h3 class="text-sm font-black text-slate-800 flex items-center gap-1.5"><i class="fa-solid fa-map-location-dot text-slate-400"></i> แผนกิจกรรมทริป</h3>
          </div>
          
          <div id="itinerary-day-tabs-bar" class="shrink-0"></div>
          
          <div id="itinerary-timeline" class="relative border-l-2 border-slate-200 pl-4 ml-2 mt-2 space-y-4">
            </div>
        </div>
      </div> 

      <div id="app-bottom-navbar" class="absolute bottom-0 left-0 right-0 h-16 bg-white border-t border-slate-200 grid grid-cols-1 z-40 shrink-0 hidden">
        <button class="flex flex-col items-center justify-center text-primary bg-transparent border-0 outline-none">
          <i class="fa-solid fa-calendar-days text-lg"></i>
          <span class="text-[10px] font-black mt-0.5">แผนเดินทาง</span>
        </button>
      </div>
    </div> 
  </div> 

  <script>
    // 🔗 ลิงก์ระบบฐานข้อมูลหลังบ้านตรงกับพิกัดที่ส่งมาเรียบร้อยแล้วครับ
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwXRGrA9yvLIsWxoAMKph-WSf13_nyZhTYbLFhLhiuuSVYl0DZz2zvRf_m0pasmk92g/exec";

    let currentUser = null; 
    let currentTripId = null;
    let cachedUsers = []; 
    let globalItineraryDataCached = []; 
    let activeSelectedDayDate = "";

    window.addEventListener("DOMContentLoaded", function() {
      loadInitialUserData();
    });

    function loadInitialUserData() {
      fetch(`${WEB_APP_URL}?action=getAllUsers`)
        .then(res => res.json())
        .then(usersList => {
          cachedUsers = usersList || [];
          const select = document.getElementById("login-user-select");
          select.innerHTML = `<option value="" disabled selected>เลือกโปรไฟล์ผู้ใช้ของตนเอง</option>`;
          cachedUsers.forEach(u => { 
            select.innerHTML += `<option value="${u.id}">${u.icon || '👤'} ${u.name}</option>`; 
          });
          switchToView("view-login");
        })
        .catch(err => {
          console.error("API Error:", err);
          switchToView("view-login");
        });
    }

    function handleUserLoginSubmit() {
      const uId = document.getElementById("login-user-select").value;
      const pin = document.getElementById("login-user-pin").value.trim();
      if(!uId || !pin) return Swal.fire("แจ้งเตือน", "กรุณาเลือกชื่อและระบุ PIN ให้ครบถ้วน", "warning");

      Swal.fire({ title: 'กำลังตรวจสอบสิทธิ์...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
      
      fetch(WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({ action: "verifyUserPin", uId: uId, pin: pin }),
        headers: { 'Content-Type': 'text/plain' }
      })
      .then(res => res.json())
      .then(res => {
        Swal.close();
        if(res.success) {
          currentUser = cachedUsers.find(u => u.id === uId);
          document.getElementById("login-user-pin").value = ""; 
          switchToView("view-trips"); 
          renderTripsList();
        } else { 
          Swal.fire("ล้มเหลว", res.error || "รหัส PIN ไม่ถูกต้อง", "error"); 
        }
      });
    }

    function renderTripsList() {
      if(!currentUser) return;
      document.getElementById("current-user-badge").innerText = `${currentUser.name}`;
      
      fetch(`${WEB_APP_URL}?action=getAllTrips`)
        .then(res => res.json())
        .then(trips => {
          const container = document.getElementById("trips-list-container");
          container.innerHTML = "";
          
          if(!trips || trips.length === 0) {
            container.innerHTML = `<div class="text-center py-8 text-xs text-slate-400 font-bold bg-white/60 rounded-2xl border border-dashed border-slate-300">ไม่พบคิวทริปท่องเที่ยวในฐานข้อมูล</div>`;
            return;
          }

          trips.forEach(t => {
            container.innerHTML += `
              <div class="card bg-white border border-slate-200 rounded-2xl p-4 shadow-2xs">
                <div class="flex justify-between items-start gap-2">
                  <div class="min-w-0 flex-1">
                    <h4 class="font-black text-slate-800 text-base">🗺️ ${t.title}</h4>
                    <p class="text-xs text-slate-400 font-bold truncate mt-0.5">${t.desc || 'ไม่มีคำอธิบาย'}</p>
                  </div>
                </div>
                <div class="flex justify-between items-center border-t border-slate-100 pt-3 mt-3">
                  <span class="text-[10px] text-slate-400 font-black">Trip ID: ${t.id}</span>
                  <button onclick="enterTripDashboard('${t.id}')" class="btn btn-sm btn-primary text-white text-xs font-black rounded-xl px-4 h-8 min-h-0">เข้าสู่ทริป ➔</button>
                </div>
              </div>`;
          });
        });
    }

    function enterTripDashboard(tripId) {
      currentTripId = tripId;
      
      Swal.fire({ title: 'กำลังโหลดแผนกิจกรรม...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
      
      fetch(`${WEB_APP_URL}?action=getTripFinancialData&tripId=${tripId}`)
        .then(res => res.json())
        .then(data => {
          Swal.close();
          if(!data || !data.success) return;

          document.getElementById("dash-trip-title").innerText = "ระบบบัญชีกลุ่มทริป";
          globalItineraryDataCached = data.itinerary || [];

          // 📅 สร้างปุ่มแท็บเลือกวันเดินทาง Dynamic จากข้อมูลจริงในฐานข้อมูล Sheets
          const tabsBar = document.getElementById("itinerary-day-tabs-bar");
          tabsBar.innerHTML = "";
          
          let uniqueDates = [...new Set(globalItineraryDataCached.map(item => item.date))].sort();
          
          if(uniqueDates.length > 0) {
            if(activeSelectedDayDate === "" || !uniqueDates.includes(activeSelectedDayDate)) {
              activeSelectedDayDate = uniqueDates[0];
            }
            uniqueDates.forEach(dStr => {
              let activeClass = (activeSelectedDayDate === dStr) 
                ? "btn btn-sm btn-primary text-white font-black rounded-xl text-xs px-3 shrink-0" 
                : "btn btn-sm bg-slate-100 border border-slate-200 font-bold rounded-xl text-slate-600 text-xs px-3 shrink-0";
              tabsBar.innerHTML += `<button onclick="changeActiveDayTab('${dStr}')" class="${activeClass}">${dStr}</button>`;
            });
          }
          
          renderItineraryTimeline();
          switchToView("view-dashboard");
        });
    }

    function renderItineraryTimeline() { 
      const itiContainer = document.getElementById("itinerary-timeline"); 
      itiContainer.innerHTML = ""; 
      
      // กรองแสดงผลแผนเดินทางเฉพาะวันที่เลือกใช้งานปัจจุบัน
      let filtered = globalItineraryDataCached.filter(item => item.date === activeSelectedDayDate); 
      
      if(filtered.length === 0) { 
        itiContainer.innerHTML = `<div class="text-slate-400 text-xs py-8 font-bold text-center bg-slate-50 border border-dashed rounded-xl">ไม่มีกิจกรรมระบุในวันนี้ครับ</div>`; 
        return; 
      } 
      
      filtered.sort((a,b) => a.time.localeCompare(b.time)).forEach(item => { 
        const map = item.mapUrl ? `<a href="${item.mapUrl}" target="_blank" class="btn btn-sm btn-circle btn-info text-white shadow-md ml-2 flex items-center justify-center w-8 h-8" style="background-color:#0284c7 !important; border:0;"><i class="fa-solid fa-location-dot text-xs"></i></a>` : ""; 
        
        // 🎨 รักษาดีไซน์ความสวยงาม: ป้ายเวลาสีชมพูพาสเทลสดใส (bg-rose-200) ตัวหนังสือสีดำเข้มคมชัด (text-black)
        itiContainer.innerHTML += `
          <div class="relative mb-3">
            <span class="absolute -left-[21px] top-1.5 bg-primary w-2 h-2 rounded-full"></span>
            <div class="text-xs font-black text-black bg-rose-200 border border-rose-300 px-2.5 py-0.5 rounded-md inline-block mb-1 shadow-3xs">
              ⏰ เวลา ${item.time} น.
            </div>
            <div class="bg-slate-50 border-2 border-slate-200 p-3 rounded-2xl flex justify-between items-center shadow-3xs">
              <div class="min-w-0 flex-1">
                <div class="font-black text-base text-slate-800 truncate">${item.activity}</div>
                <div class="text-xs text-slate-400 font-bold truncate mt-0.5">
                  <i class="fa-solid fa-map-pin mr-1 text-slate-300"></i>${item.location || 'ไม่ได้ระบุสถานที่'}
                </div>
              </div>
              <div class="shrink-0">${map}</div>
            </div>
          </div>`; 
      }); 
    }

    function changeActiveDayTab(dStr) { 
      activeSelectedDayDate = dStr; 
      // รีเรนเดอร์แถบปุ่มให้เปลี่ยนคลาส Active
      enterTripDashboard(currentTripId); 
    }

    function switchToView(viewId) {
      const allViews = ["view-login", "view-trips", "view-dashboard"];
      allViews.forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.classList.add("hidden"); el.style.display = "none"; }
      });
      
      const navbar = document.getElementById("app-bottom-navbar");
      if (navbar) navbar.classList.add("hidden");

      const targetEl = document.getElementById(viewId);
      if (targetEl) { targetEl.classList.remove("hidden"); targetEl.style.display = "flex"; }

      if(viewId === "view-dashboard" && navbar) { 
        navbar.classList.remove("hidden"); 
        const subIti = document.getElementById("sub-view-itinerary");
        if(subIti) subIti.classList.remove("hidden");
      }
    }

    function backToTrips() { switchToView("view-trips"); renderTripsList(); }
    function backToLogin() { currentUser = null; switchToView("view-login"); }
  </script>
  
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => console.log('PWA Service Worker Registered Successfully'));
    }
  </script>
</body>
</html>
